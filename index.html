<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Candle Blow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prefixfree/1.0.7/prefixfree.min.js"></script>
  </head>
  <body>
    <div class="happy-birthday">Happy Birthday Navyaaa!</div>
    <div class="cake">

    <div class="balloon balloon9"></div>
    <div class="balloon balloon10"></div>
    <div class="balloon balloon11"></div>
    <div class="balloon balloon12"></div>
    <div class="balloon balloon13"></div>
    <div class="balloon balloon14"></div>
    <div class="balloon balloon15"></div>
    <div class="balloon balloon16"></div>

    <div class="sparkle sparkle1">✨</div>
    <div class="sparkle sparkle2">✨</div>
    <div class="sparkle sparkle3">✨</div>
    <div class="sparkle sparkle4">✨</div>
    <div class="sparkle sparkle5">✨</div>

    <div class="sparkle sparkle7">✨</div>

    <div class="sparkle sparkle10">✨</div>

    <div class="sparkle sparkle12">✨</div>
    <div class="sparkle sparkle13">✨</div>
    <div class="sparkle sparkle14">✨</div>
    <div class="sparkle sparkle15">✨</div>
    <div class="sparkle sparkle16">✨</div>
    <div class="sparkle sparkle17">✨</div>
    <div class="sparkle sparkle18">✨</div>
    <div class="sparkle sparkle19">✨</div>
    <div class="sparkle sparkle20">✨</div>

    <div class="confetti confetti1"></div>
    <div class="confetti confetti2"></div>
    <div class="confetti confetti3"></div>
    <div class="confetti confetti4"></div>
    <div class="confetti confetti5"></div>
    <div class="confetti confetti6"></div>
    <div class="confetti confetti7"></div>
    <div class="confetti confetti8"></div>
